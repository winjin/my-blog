name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and build
        env:
          PUBLIC_GISCUS_REPO: winjin/my-blog
          PUBLIC_GISCUS_REPO_ID: R_kgDOSmK3Zg
          PUBLIC_GISCUS_CATEGORY: Announcements
          PUBLIC_GISCUS_CATEGORY_ID: DIC_kwDOSmK3Zs4C9tpn
        run: |
          rm -f package-lock.json
          npm install
          npm run build

      - name: Deploy to server via rsync
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null

          rsync -avz --delete \
            dist/ \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/my-blog/dist/

          echo "Deploy complete!"

      - name: Publish new posts to WeChat draft (from server)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          # SSH key + known_hosts were written to ~/.ssh in the deploy step
          # (same runner, shared filesystem). The WeChat API call runs ON the
          # server so it originates from the server's whitelisted static IP.
          rsync -avz \
            src/content/posts/ \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/my-blog/src/content/posts/

          rsync -avz \
            scripts/publish-wechat.mjs \
            -e "ssh -i ~/.ssh/id_ed25519" \
            ${DEPLOY_USER}@${DEPLOY_HOST}:/var/www/my-blog/scripts/publish-wechat.mjs

          ssh -i ~/.ssh/id_ed25519 ${DEPLOY_USER}@${DEPLOY_HOST} \
            "cd /var/www/my-blog && node scripts/publish-wechat.mjs --new"
